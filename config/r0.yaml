# R0 — конфиг выбора моментов. Всё, что вынесено из кода (R0_SPEC §10).
duration_preset: shorts        # shorts | reels | tiktok
min_score: 65
max_reels: null                # null = все прошедшие порог
chunk_tokens: 3500
chunk_overlap_sec: 60
dedup_overlap_threshold: 0.5
sentence_pause_sec: 0.35        # склейка предложений: пауза > порога рвёт предложение
                                # (Whisper на русском роняет пунктуацию → порог занижен).
                                # тот же порог = «пауза» при snap границ к словам (R4-min)
tail_sec: 0.3                   # хвост после последнего слова при snap — фраза договаривается
snap_window_sec: 1.5            # окно поиска границы слова/паузы при snap (±сек от LLM-границы)
max_sentence_buffer_sec: 30     # запас сверх max_duration пресета: эффективный порог
                                # дробления = max_duration + запас (shorts ≈ 89с). Гиганты
                                # режутся по самым длинным внутренним паузам; легальные
                                # моменты 30–59с остаются целыми (см. R0Config.max_sentence_sec)
title_style: clickbait_ru      # рамка кликбейт-заголовка (R0_SPEC §4)
language: ru                   # язык вывода LLM
prompt_language: en            # system-промпт на английском (крепче grounding)

# Пресеты длины (сек) — PROJECT_GUIDE / R0_SPEC §3. Код-валидатор ставит too_long/too_short.
presets:
  shorts: { min: 15, max: 59 }
  reels:  { min: 15, max: 90 }
  tiktok: { min: 15, max: 180 }

# Пути к рантайм-промптам R0 (не хардкод в коде — берутся отсюда).
prompts:
  system: prompts/r0_system.md
  fewshot: prompts/r0_fewshot.json

# Чанкинг: Whisper-чанкинг аудио (M1.2) + R0-чанкинг транскрипта (M1.3, не реализован).
chunking:
  enabled: true
  whisper_chunk_duration_sec: 600      # 10 мин на чанк
  whisper_threshold_minutes: 15        # порог «чанкить» по длительности
  whisper_threshold_bytes: 20971520    # 20 МБ — второй гард по размеру аудио
  silence_window_sec: 30               # окно VAD поиска тишины вокруг target-границы (±сек)
  silence_threshold_db: -40            # порог silencedetect
  r0_chunk_tokens: 3000                # токены на R0-чанк транскрипта
  r0_overlap_tokens: 300               # перекрытие R0-чанков (≈60с речи)
  dedup_overlap_ratio: 0.5             # порог дедупа рилов из разных R0-чанков
  fail_fast: false                     # false → продолжать при провале одного чанка
