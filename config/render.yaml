# Параметры локального рендера ffmpeg. Ноль магических чисел в коде.
scale: [1080, 1920]            # целевое вертикальное разрешение 9:16

encoder:
  # Энкодер — env-параметр (RENDER_ENCODER), дефолт libx264 (везде работает, без GPU).
  # prod на AMD → h264_vaapi (Linux) / h264_amf (Windows), НЕ NVENC. Выбор — на шаге 6.
  codec: libx264
  fallback_codec: libx264
  preset: medium              # пресет libx264; для VAAPI/AMF переопределяется на шаге 6
  cq: 23

audio:
  codec: aac
  bitrate: 160k

# Извлечение аудиодорожки под Whisper (cloud/extract_audio.py, ffmpeg -vn).
# 16kHz mono PCM — то, что ждёт faster-whisper; wav читается stdlib без ffprobe.
audio_extract:
  sample_rate: 16000
  channels: 1
  codec: pcm_s16le
  format: wav

subtitles:
  # ASS-стиль из PROJECT_GUIDE §визуальная часть. Белый, жирный, CAPS, нижняя треть.
  font: Montserrat
  font_size: 72
  margin_v: 300               # сажает текст в нижнюю треть (зона над UI платформы)
  words_per_line: [2, 4]      # группировка поп-апа по словам (\k)
  # font_dir — путь к шрифтам для ffmpeg (fontsdir). Заполняется под машину рендера.
  font_dir: null
